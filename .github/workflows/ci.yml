name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check empirlab/ --select E,F,W --ignore E501

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy>=1.24 pandas>=2.0 scikit-learn>=1.3 scipy>=1.10 matplotlib>=3.7
          pip install pytest pytest-cov

      - name: Run core tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_causal.py tests/test_causal_v2.py \
                 tests/test_utils.py tests/test_finance.py \
                 -v --tb=short

  test-dl:
    name: Tests DL (with torch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip (torch)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-torch-cpu-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-torch-cpu-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run DL tests
        env:
          PYTHONPATH: .
        run: pytest tests/test_dl.py -v --tb=short

  test-rl:
    name: Tests RL (with gymnasium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pytest gymnasium

      - name: Run RL tests
        env:
          PYTHONPATH: .
        run: pytest tests/test_rl.py -v --tb=short
